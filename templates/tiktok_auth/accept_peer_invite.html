<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Accept Comparison</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,sans-serif;color:#fff;background:#07080d}.card{width:min(calc(100% - 36px),560px);padding:30px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.05)}p{color:#a7aab5;line-height:1.7}button{min-height:46px;padding:0 18px;border:0;border-radius:10px;color:#fff;font-weight:850;background:#fe2c55;cursor:pointer}</style></head><body><main class="card"><h1>Accept peer comparison?</h1><p>{{ comparison.requesting_account.display_name|default:"A connected creator" }} invited this connected account to compare posting frequency, engagement, views, and followers. Both sides can revoke access later.</p><form method="post">{% csrf_token %}<button type="submit">Accept comparison</button></form></main></body></html>
